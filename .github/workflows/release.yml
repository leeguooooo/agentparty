name: release

# 触发：PR / main push 跑完整门禁；推 v* tag 先跑同一门禁，再发布。
# bun build --compile 支持跨平台交叉编译，5 个三元组全部在同一台 ubuntu runner
# 上出包，保证工具链一致、provenance 统一。
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

# 顶层默认最小权限；各 job 按需覆盖。
permissions:
  contents: read

jobs:
  # ── #247 变更范围探测：只在 PR 上判断「是不是纯 CLI 改动」──────────
  # fail-safe 方向：cli_only 只在「PR + 有 cli/ 变更 + 没有任何非 cli/ 变更」时为真。
  # 任何 cli/ 之外的文件（worker/web/shared/scripts/desktop/workflow/根 package.json…）
  # 都让 non_cli=true → 回落全量 check。配错只会多跑，绝不漏测。
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cli_only: ${{ github.event_name == 'pull_request' && steps.filter.outputs.cli == 'true' && steps.filter.outputs.non_cli == 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
            non_cli:
              - '!cli/**'

  # ── #9 pre-merge / release gate：必须覆盖测试文件 tsc ─────────────
  # 唯一的 required 门禁，名字保持 "full check"（分支保护不用改）。
  # #247：纯 CLI 的 PR 只跑 check:cli（秒级），否则跑全量 check（行为不变）。
  check:
    name: full check
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install deps
        run: bun install --frozen-lockfile

      - name: verify release version contract
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CLI_VERSION=$(bun -e 'process.stdout.write(require("./cli/package.json").version)')
          DESKTOP_VERSION=$(bun -e 'process.stdout.write(require("./desktop/package.json").version)')
          if ! { [ "$TAG_VERSION" = "$CLI_VERSION" ] && [ "$TAG_VERSION" = "$DESKTOP_VERSION" ]; }; then
            echo "::error::release version mismatch: tag=$TAG_VERSION cli=$CLI_VERSION desktop=$DESKTOP_VERSION"
            exit 1
          fi

      # #247：纯 CLI 改动走 check:cli 快路径；其余一律全量。
      # 快路径只由 changes.cli_only 决定，而它 fail-safe 偏向全量——判断在 changes job，
      # 这里只是执行。tag/main push（非 PR）永远走全量。
      - name: run check (cli-only fast path or full)
        run: |
          set -euo pipefail
          if [ "${{ needs.changes.outputs.cli_only }}" = "true" ]; then
            echo "#247: 纯 CLI 改动 → 只跑 check:cli（快路径）"
            bun run check:cli
          else
            echo "#247: 非纯 CLI（或非 PR）→ 全量 check"
            bun run check
          fi

  # ── 交叉编译 + 打包 + 构建溯源 ──────────────────────────────
  build:
    name: build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      id-token: write # attest-build-provenance 走 sigstore oidc 签名
      attestations: write # 写 attestation 到本仓库
    strategy:
      fail-fast: false
      matrix:
        # target = bun 交叉编译三元组；asset = install.sh/ps1 请求的简洁平台名
        # （去掉 bun- 前缀、不含 version）。资产名统一为 party-<asset>.tar.gz。
        include:
          - target: bun-linux-x64
            asset: linux-x64
            ext: ""
          - target: bun-linux-arm64
            asset: linux-arm64
            ext: ""
          - target: bun-darwin-x64
            asset: darwin-x64
            ext: ""
          - target: bun-darwin-arm64
            asset: darwin-arm64
            ext: ""
          - target: bun-windows-x64
            asset: windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # 用根 lockfile 装全 workspace，保证 workspace:* 依赖（@agentparty/shared）可解析
      - name: install deps
        run: bun install --frozen-lockfile

      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: compile binary
        working-directory: cli
        run: |
          bun build --compile --target=${{ matrix.target }} \
            ./src/index.ts --outfile "party${{ matrix.ext }}"

      # #9 release-asset smoke：跑「真二进制」验 json 契约 + stdout/stderr/exit，
      # 堵 v0.2.7 那种「源码测试过了但打包入口/旧 binary 行为脱节」。只在 runner 原生的 linux-x64 跑。
      - name: json contract smoke
        if: matrix.target == 'bun-linux-x64'
        working-directory: cli
        env:
          AGENTPARTY_HOME: ${{ runner.temp }}/ap-smoke # 干净隔离，无残留 config/account
        run: |
          set -euo pipefail
          echo "version=$(./party --version)"
          # whoami --json（未登录）：schema/type/logged_in 且 stdout-only（stderr 须空）
          out="$(./party whoami --json 2>/tmp/w.err)"
          echo "$out" | jq -e '.schema=="agentparty.v1" and .type=="whoami" and .logged_in==false' >/dev/null
          if [ -s /tmp/w.err ]; then echo "FAIL: whoami --json 不该往 stderr 写"; cat /tmp/w.err; exit 1; fi
          # per-command --help：exit 0 + usage 到 stdout
          ./party history --help | grep -q usage
          # 错误路径 history --json（无 config）：exit≠0 + stdout 空 + stderr 有错（transport 契约）
          if ./party history --json >/tmp/hj.out 2>/tmp/hj.err; then echo "FAIL: 应非零退出"; exit 1; fi
          if [ -s /tmp/hj.out ]; then echo "FAIL: 错误路径 stdout 应为空"; cat /tmp/hj.out; exit 1; fi
          grep -q "no config" /tmp/hj.err
          echo "json contract smoke ✅"

      # 打 tar.gz + sha256（资产名与 install.sh/ps1 请求一致：party-<asset>.tar.gz）
      # sha256 文件里存 tar.gz 的名字，install 侧直接取第一段 hash 比对。
      - name: package
        id: pkg
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          pkg="party-${ASSET}.tar.gz"
          tar -czf "$pkg" -C cli "party${{ matrix.ext }}"
          sha256sum "$pkg" > "${pkg}.sha256"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"

      # cosign 离线验签链路：用 secrets 里的私钥对每个 tarball 签名，产出 <pkg>.sig。
      # install.sh/ps1 内嵌 pinned 公钥离线 verify-blob。未配私钥时跳过（install 侧回退 sha256）。
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign blob
        id: sign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          PKG: ${{ steps.pkg.outputs.pkg }}
        run: |
          if [ -z "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "::warning::COSIGN_PRIVATE_KEY 未配置 — 跳过签名（install 侧仅 sha256）"
            exit 0
          fi
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY \
            "$PKG" --output-signature "${PKG}.sig"

      # 保留 attest-build-provenance 作为额外溯源层（gh attestation verify 可增强验证）
      - name: attest provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.pkg.outputs.pkg }}

      # party-*.tar.gz* 一把捞 tar.gz / .sha256 / .sig（.sig 未签名时缺省，glob 不报错）
      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: party-*.tar.gz*
          if-no-files-found: error
          retention-days: 7

  desktop:
    name: build desktop ${{ matrix.asset }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ${{ matrix.runner }}
    environment:
      name: release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset: darwin-x64
          - runner: macos-14
            asset: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install deps
        run: bun install --frozen-lockfile

      - name: resolve updater key mode
        id: updater-key-mode
        env:
          DESKTOP_UPDATER_KEY_MODE: ${{ vars.DESKTOP_UPDATER_KEY_MODE }}
          DESKTOP_UPDATER_BRIDGE_TAG: ${{ vars.DESKTOP_UPDATER_BRIDGE_TAG }}
        run: |
          set -euo pipefail
          mode="${DESKTOP_UPDATER_KEY_MODE:-}"
          case "$mode" in
            legacy|bridge|v2) ;;
            *)
              echo "::error::invalid DESKTOP_UPDATER_KEY_MODE: $mode"
              exit 1
              ;;
          esac
          if [ "$mode" != "legacy" ] && [ -z "${DESKTOP_UPDATER_BRIDGE_TAG:-}" ]; then
            echo "::error::DESKTOP_UPDATER_BRIDGE_TAG is required for $mode updater key mode"
            exit 1
          fi
          if [ "$mode" = "bridge" ] && [ "$DESKTOP_UPDATER_BRIDGE_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::bridge mode requires DESKTOP_UPDATER_BRIDGE_TAG to equal the release tag"
            exit 1
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: require legacy updater signing key
        if: steps.updater-key-mode.outputs.mode != 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for desktop updater artifacts"
            exit 1
          fi

      - name: require v2 updater signing key
        if: steps.updater-key-mode.outputs.mode == 'bridge' || steps.updater-key-mode.outputs.mode == 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY_V2: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_V2:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_V2 is required for ${{ steps.updater-key-mode.outputs.mode }} updater key mode"
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 is required for ${{ steps.updater-key-mode.outputs.mode }} updater key mode"
            exit 1
          fi

      - name: detect Apple Developer ID and notarization credentials
        id: apple-signing
        env:
          DESKTOP_REQUIRE_NOTARIZATION: ${{ vars.DESKTOP_REQUIRE_NOTARIZATION }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          require_notarization="${DESKTOP_REQUIRE_NOTARIZATION:-false}"
          if [ "$require_notarization" != "true" ] && [ "$require_notarization" != "false" ]; then
            echo "::error::DESKTOP_REQUIRE_NOTARIZATION must be true or false"
            exit 1
          fi
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            if [ "$require_notarization" = "true" ]; then
              printf '::error::Apple signing is required; missing: %s\n' "$(IFS=', '; echo "${missing[*]}")"
              exit 1
            fi
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            printf '::warning::Apple signing is unavailable; publishing an unnotarized desktop preview. Missing: %s\n' "$(IFS=', '; echo "${missing[*]}")"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: import Apple Developer ID certificate
        if: steps.apple-signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/agentparty-developer-id.p12"
          keychain_path="$RUNNER_TEMP/agentparty-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          default_keychain="$(security default-keychain -d user | tr -d '"')"
          security list-keychains -d user -s "$keychain_path" "$default_keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
          signing_identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [ -z "$signing_identity" ]; then
            echo "::error::Developer ID Application identity was not found in the imported certificate"
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"

      - name: build notarized desktop app with legacy updater key
        if: steps.apple-signing.outputs.enabled == 'true' && steps.updater-key-mode.outputs.mode != 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run desktop:build:prod

      - name: build notarized desktop app with v2 updater key
        if: steps.apple-signing.outputs.enabled == 'true' && steps.updater-key-mode.outputs.mode == 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run desktop:build:prod

      - name: build unnotarized desktop preview with legacy updater key
        if: steps.apple-signing.outputs.enabled == 'false' && steps.updater-key-mode.outputs.mode != 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run desktop:build:prod

      - name: build unnotarized desktop preview with v2 updater key
        if: steps.apple-signing.outputs.enabled == 'false' && steps.updater-key-mode.outputs.mode == 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
        run: bun run desktop:build:prod

      - name: verify Developer ID signature and notarization ticket
        if: steps.apple-signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          app="$(find desktop/src-tauri/target/release/bundle/macos -name '*.app' -type d | head -n 1)"
          dmg="$(find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -type f | head -n 1)"
          if [ -z "$app" ] || [ -z "$dmg" ]; then
            echo "::error::macOS app bundle or DMG is missing"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=4 "$app"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"

      - name: sign bridge updater with v2 key
        if: steps.updater-key-mode.outputs.mode == 'bridge'
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
        run: |
          set -euo pipefail
          updater="$(find src-tauri/target/release/bundle/macos -name '*.app.tar.gz' -type f | head -n 1)"
          if [ -z "$updater" ] || [ ! -s "${updater}.sig" ]; then
            echo "::error::legacy updater signature is missing before bridge dual-signing"
            exit 1
          fi
          cp "${updater}.sig" "${updater}.sig.legacy"
          rm "${updater}.sig"
          bunx tauri signer sign "$updater"
          if [ ! -s "${updater}.sig" ]; then
            echo "::error::v2 updater signature was not generated"
            exit 1
          fi
          mv "${updater}.sig" "${updater}.sig.v2"
          mv "${updater}.sig.legacy" "${updater}.sig"

      - name: package desktop artifacts
        env:
          ASSET: ${{ matrix.asset }}
          NOTARIZED: ${{ steps.apple-signing.outputs.enabled }}
          UPDATER_KEY_MODE: ${{ steps.updater-key-mode.outputs.mode }}
        run: |
          set -euo pipefail
          dmg="$(find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -type f 2>/dev/null | head -n 1 || true)"
          updater="$(find desktop/src-tauri/target/release/bundle/macos -name '*.app.tar.gz' -type f 2>/dev/null | head -n 1 || true)"
          if [ ! -s "$dmg" ] || [ ! -s "$updater" ] || [ ! -s "${updater}.sig" ]; then
            echo "Missing DMG, updater bundle, or updater signature"
            find desktop/src-tauri/target/release/bundle -type f || true
            exit 1
          fi
          if [ "$UPDATER_KEY_MODE" = "bridge" ] && [ ! -s "${updater}.sig.v2" ]; then
            echo "::error::bridge updater v2 signature is missing"
            exit 1
          fi
          dmg_out="agentparty-desktop-${ASSET}.dmg"
          updater_out="agentparty-desktop-${ASSET}.app.tar.gz"
          cp "$dmg" "$dmg_out"
          cp "$updater" "$updater_out"
          cp "${updater}.sig" "${updater_out}.sig"
          if [ "$UPDATER_KEY_MODE" = "bridge" ]; then
            cp "${updater}.sig.v2" "${updater_out}.sig.v2"
          fi
          shasum -a 256 "$dmg_out" > "${dmg_out}.sha256"
          distribution="preview"
          if [ "$NOTARIZED" = "true" ]; then
            distribution="production"
          fi
          printf '{"notarized":%s,"distribution":"%s","updater_key_mode":"%s"}\n' \
            "$NOTARIZED" "$distribution" "$UPDATER_KEY_MODE" > "agentparty-desktop-${ASSET}.signing-status.json"

      - name: upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.asset }}
          path: agentparty-desktop-*
          if-no-files-found: error
          retention-days: 7

  # ── 汇总所有产物挂到该 tag 的 Release ──────────────────────
  release:
    name: publish release
    needs:
      - build
      - desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write # 建/改 Release、上传 assets
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: resolve updater key mode
        id: updater-key-mode
        env:
          DESKTOP_UPDATER_KEY_MODE: ${{ vars.DESKTOP_UPDATER_KEY_MODE }}
          DESKTOP_UPDATER_BRIDGE_TAG: ${{ vars.DESKTOP_UPDATER_BRIDGE_TAG }}
        run: |
          set -euo pipefail
          mode="${DESKTOP_UPDATER_KEY_MODE:-}"
          case "$mode" in
            legacy|bridge|v2) ;;
            *)
              echo "::error::invalid DESKTOP_UPDATER_KEY_MODE: $mode"
              exit 1
              ;;
          esac
          if [ "$mode" != "legacy" ] && [ -z "${DESKTOP_UPDATER_BRIDGE_TAG:-}" ]; then
            echo "::error::DESKTOP_UPDATER_BRIDGE_TAG is required for $mode updater key mode"
            exit 1
          fi
          if [ "$mode" = "bridge" ] && [ "$DESKTOP_UPDATER_BRIDGE_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::bridge mode requires DESKTOP_UPDATER_BRIDGE_TAG to equal the release tag"
            exit 1
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: classify desktop distribution
        env:
          EXPECTED_UPDATER_KEY_MODE: ${{ steps.updater-key-mode.outputs.mode }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          status_files=(dist/*.signing-status.json)
          if [ "${#status_files[@]}" -ne 2 ]; then
            echo "::error::expected two desktop signing status files, found ${#status_files[@]}"
            exit 1
          fi

          status_count="$(jq -s 'map({notarized, distribution, updater_key_mode}) | unique | length' "${status_files[@]}")"
          if [ "$status_count" -ne 1 ]; then
            echo "::error::desktop architectures disagree on signing status or updater key mode"
            jq -s '.' "${status_files[@]}"
            exit 1
          fi

          notarized="$(jq -r '.notarized' "${status_files[0]}")"
          distribution="$(jq -r '.distribution' "${status_files[0]}")"
          updater_key_mode="$(jq -r '.updater_key_mode' "${status_files[0]}")"
          if [ "$updater_key_mode" != "$EXPECTED_UPDATER_KEY_MODE" ]; then
            echo "::error::desktop updater key mode does not match release configuration"
            exit 1
          fi
          if [ "$notarized" = "true" ] && [ "$distribution" = "production" ]; then
            DESKTOP_RELEASE_NOTES="AgentParty $GITHUB_REF_NAME desktop update; Developer ID signed and Apple notarized."
            cat > dist/release-body.md <<EOF
          ## AgentParty $GITHUB_REF_NAME

          CLI packages and the macOS desktop application are available below.

          The macOS desktop artifacts are Developer ID signed and Apple notarized. Gatekeeper verification is part of the release workflow.
          EOF
          elif [ "$notarized" = "false" ] && [ "$distribution" = "preview" ]; then
            DESKTOP_RELEASE_NOTES="AgentParty $GITHUB_REF_NAME unnotarized macOS preview; Gatekeeper may block manual installation."
            cat > dist/release-body.md <<EOF
          ## AgentParty $GITHUB_REF_NAME

          CLI packages are production release artifacts.

          > **macOS desktop preview:** The DMG files are not Developer ID signed or Apple notarized. Gatekeeper may block manual installation. The AgentParty website does not present these files as a formal desktop download.
          EOF
          else
            echo "::error::invalid desktop signing status: notarized=$notarized distribution=$distribution"
            exit 1
          fi
          echo "DESKTOP_RELEASE_NOTES=$DESKTOP_RELEASE_NOTES" >> "$GITHUB_ENV"

      - name: generate desktop updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATER_KEY_MODE: ${{ steps.updater-key-mode.outputs.mode }}
          DESKTOP_UPDATER_BRIDGE_TAG: ${{ vars.DESKTOP_UPDATER_BRIDGE_TAG }}
        run: |
          set -euo pipefail
          generate_manifest() {
            local output="$1"
            local signature_suffix="$2"
            bun scripts/desktop-update-manifest.ts \
              --version "${GITHUB_REF_NAME#v}" \
              --tag "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --dir dist \
              --output "$output" \
              --notes "$DESKTOP_RELEASE_NOTES" \
              --signature-suffix "$signature_suffix"
          }

          case "$UPDATER_KEY_MODE" in
            legacy)
              generate_manifest dist/latest.json ".sig"
              ;;
            bridge)
              generate_manifest dist/latest.json ".sig"
              generate_manifest dist/latest-v2.json ".sig.v2"
              ;;
            v2)
              gh release download "$DESKTOP_UPDATER_BRIDGE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern latest.json \
                --output dist/latest.json
              bridge_version="${DESKTOP_UPDATER_BRIDGE_TAG#v}"
              encoded_bridge_tag="$(jq -rn --arg tag "$DESKTOP_UPDATER_BRIDGE_TAG" '$tag | @uri')"
              bridge_path="/releases/download/${encoded_bridge_tag}/"
              if ! jq -e --arg version "$bridge_version" --arg bridge_path "$bridge_path" '
                .version == $version and
                (.platforms | type == "object" and length > 0) and
                all(.platforms[];
                  (.url | type == "string" and contains($bridge_path)) and
                  (.signature | type == "string" and length > 0)
                )
              ' dist/latest.json >/dev/null; then
                echo "::error::legacy updater manifest does not point to the configured bridge tag"
                exit 1
              fi
              generate_manifest dist/latest-v2.json ".sig"
              ;;
          esac

      - name: classify release channel
        id: release-channel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_WITHOUT_BUILD="${VERSION%%+*}"
          if [[ "$VERSION_WITHOUT_BUILD" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

      # CLI cosign .sig 是可选层（未配 COSIGN_PRIVATE_KEY 时不存在），故保留
      # fail_on_unmatched_files:false；Tauri updater .sig 已由 desktop job 强制校验。
      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.release-channel.outputs.prerelease }}
          make_latest: ${{ steps.release-channel.outputs.make_latest }}
          body_path: dist/release-body.md
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
            dist/*.tar.gz.sig.v2
            dist/*.dmg
            dist/*.dmg.sha256
            dist/*.signing-status.json
            dist/latest.json
            dist/latest-v2.json
