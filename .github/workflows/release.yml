name: release

# 触发：PR / main push 跑完整门禁；推 v* tag 先跑同一门禁，再发布。
# bun build --compile 支持跨平台交叉编译，5 个三元组全部在同一台 ubuntu runner
# 上出包，保证工具链一致、provenance 统一。
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

# 顶层默认最小权限；各 job 按需覆盖。
permissions:
  contents: read

jobs:
  # ── #247 变更范围探测：只在 PR 上判断「是不是纯 CLI 改动」──────────
  # fail-safe 方向：cli_only 只在「PR + 有 cli/ 变更 + 没有任何非 cli/ 变更」时为真。
  # 任何 cli/ 之外的文件（worker/web/shared/scripts/desktop/workflow/根 package.json…）
  # 都让 non_cli=true → 回落全量 check。配错只会多跑，绝不漏测。
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # dorny/paths-filter 在 PR 模式下用 API 列变更文件（含 fork PR / 默认权限收紧时）
    outputs:
      cli_only: ${{ github.event_name == 'pull_request' && steps.filter.outputs.cli == 'true' && steps.filter.outputs.non_cli == 'false' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
            non_cli:
              - '!cli/**'

  # ── #9 pre-merge / release gate：每个 workspace 独立并行跑，墙上时间=最慢单个 ──
  # 6 个检查区域（cli/worker/web/shared/scripts/desktop）互不依赖（worker vitest 用隔离的
  # 空 assets 目录，不再需要 web/dist），原来一个 job 串行跑 `bun run check` 要 ~6min，
  # 拆并行后 ≈ 最慢那个 job。
  # 复用的 setup 步骤（checkout+bun+install cache+install）由 composite action 提供。
  #
  # 快路径（#247）：纯 CLI 的 PR 只有 check-cli 真跑；worker/web/shared/scripts 靠
  # `if: cli_only != 'true'` 跳过。fail-safe 方向不变——cli_only 只在 changes job 里
  # 按「PR + cli 变更 + 无任何非 cli 变更」判定，配错只多跑绝不漏测；tag/main push
  # 非 PR，cli_only 恒 false，5 个 workspace 全跑。

  # cli 在两条路径下都要跑，所以无条件执行。
  check-cli:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-install
      - run: bun run check:cli

  # web/shared/scripts：非纯 CLI（或非 PR）才跑，纯 CLI 快路径下 skip。
  # worker 因为一个 workerd 串行跑 43 个 spec 太慢（~6min），单独拆分片 job，见下。
  check-rest:
    name: check ${{ matrix.ws }}
    needs: changes
    if: needs.changes.outputs.cli_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        ws: [web, shared, scripts]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-install
      - run: bun run check:${{ matrix.ws }}

  # worker 测试：43 个 spec 在单 workerd 里串行要 ~6min，是唯一长杆。
  # 用 vitest --shard 按文件切成 6 片并行——每片是独立 runner 上的全新 workerd，
  # 跨片没有同一 job 内的 DO thrash（fileParallelism:false/singleWorker 只约束单 job 内）。
  # 墙上时间 ≈ 最重那一片，而非全部串行之和。
  check-worker:
    name: check worker (shard ${{ matrix.shard }}/6)
    needs: changes
    if: needs.changes.outputs.cli_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-install
      - name: verify test runtime
        working-directory: worker
        run: bun run verify:test-runtime
      - name: vitest shard ${{ matrix.shard }}/6
        working-directory: worker
        run: bunx vitest run --shard=${{ matrix.shard }}/6

  # worker tsc 只跑一次，放并行独立 job（不放进分片，避免每片重复 typecheck）。
  check-worker-types:
    name: check worker (types)
    needs: changes
    if: needs.changes.outputs.cli_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-install
      - working-directory: worker
        run: bunx tsc --noEmit

  # Desktop Rust checks require macOS system frameworks. Keep this in the normal PR/main gate,
  # while preserving the explicit CLI-only PR fast path.
  check-desktop:
    name: check desktop (macOS)
    needs: changes
    if: needs.changes.outputs.cli_only != 'true'
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-install
      # Rust 依赖（tauri/wry/objc2… ~400 crate）编译占了这个 job 的大头；缓存 ~/.cargo + target/
      # 后每次只增量编译改动，冷编 ~3min → 温编数十秒。key 随 Cargo.lock 变化，工具链升级自动失效。
      - name: cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: verify desktop version consistency
        run: |
          set -euo pipefail
          VERSION="$(bun -p "require('./cli/package.json').version")"
          bun scripts/release-version.ts --check "$VERSION"
      - name: prepare desktop sidecar
        working-directory: desktop
        run: bun run prepare:sidecar
      - name: test desktop Rust
        working-directory: desktop/src-tauri
        run: cargo test --locked
      - name: check desktop Rust build
        working-directory: desktop/src-tauri
        run: cargo check --locked

  # ── #137 供应链输入侧：bun audit 扫 bun.lock 依赖树已知漏洞 ──────────
  # 只在 PR 上跑，且不进 "full check" 的 needs——bun audit 命中的公开漏洞库
  # 会随时间变化，把它塞进 required 门禁等于让历史 PR 因为无关的第三方新
  # CVE 突然变红。先让结果在 job 日志/summary 里可见，观察一段时间稳定后
  # 再考虑收紧成阻断项。
  dependency-audit:
    name: dependency audit (bun audit)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-install
      - name: bun audit
        run: |
          set +e
          bun audit 2>&1 | tee bun-audit.log
          status="${PIPESTATUS[0]}"
          set -e
          {
            echo "## bun audit (#137，非阻断)"
            echo '```'
            cat bun-audit.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$status" -ne 0 ]; then
            echo "::warning::bun audit reported findings (exit $status) — non-blocking, see job summary"
          fi
          exit 0

  # 发布版本契约：只在 tag 上校验 tag == CLI / desktop JS / desktop Rust 版本。
  # 非 tag 时 skip（聚合门禁把 skipped 当通过）。
  version-contract:
    needs: changes
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-install
      - name: verify release version contract
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          bun scripts/release-version.ts --check "$TAG_VERSION"
          LATEST_TAG="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)"
          bun scripts/release-version.ts --check-not-older-than "${LATEST_TAG#v}" "$TAG_VERSION"

  # 唯一的 required 门禁，名字保持 "full check"（分支保护映射的就是它，不用改设置）。
  # if: always() → 无论上游成功/跳过/失败都跑；任一 workspace job 结论为 failure/cancelled
  # 则本 job 失败，skipped（快路径跳过的）与 success 都算通过。build/desktop 仍 needs: check。
  check:
    name: full check
    needs:
      - check-cli
      - check-rest
      - check-worker
      - check-worker-types
      - check-desktop
      - version-contract
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: aggregate workspace check results
        env:
          R_CLI: ${{ needs.check-cli.result }}
          R_REST: ${{ needs.check-rest.result }}
          R_WORKER: ${{ needs.check-worker.result }}
          R_WORKER_TYPES: ${{ needs.check-worker-types.result }}
          R_DESKTOP: ${{ needs.check-desktop.result }}
          R_VERSION: ${{ needs.version-contract.result }}
        run: |
          set -euo pipefail
          echo "cli=$R_CLI rest=$R_REST worker=$R_WORKER worker-types=$R_WORKER_TYPES desktop=$R_DESKTOP version=$R_VERSION"
          fail=0
          for r in "$R_CLI" "$R_REST" "$R_WORKER" "$R_WORKER_TYPES" "$R_DESKTOP" "$R_VERSION"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::required check job did not pass: result=$r"; fail=1 ;;
            esac
          done
          [ "$fail" = "0" ] || exit 1
          echo "full check ✅"

  # ── 交叉编译 + 打包 + 构建溯源 ──────────────────────────────
  build:
    name: build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    # 解耦门禁：CLI 交叉编译只依赖 CLI/worker/shared/scripts 相关 check + 版本契约，不再等最慢的
    # macOS check-desktop（~3min）。publish 仍 needs build+desktop，desktop needs check-desktop，
    # 故 union 仍覆盖全部 check——"全绿才发布"的保证不变，只是各 build 一拿到自己那份绿就开跑。
    needs:
      - check-cli
      - check-rest
      - check-worker
      - check-worker-types
      - version-contract
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      id-token: write # attest-build-provenance 走 sigstore oidc 签名
      attestations: write # 写 attestation 到本仓库
    strategy:
      fail-fast: false
      matrix:
        # target = bun 交叉编译三元组；asset = install.sh/ps1 请求的简洁平台名
        # （去掉 bun- 前缀、不含 version）。资产名统一为 party-<asset>.tar.gz。
        include:
          - target: bun-linux-x64
            asset: linux-x64
            ext: ""
          - target: bun-linux-arm64
            asset: linux-arm64
            ext: ""
          - target: bun-darwin-x64
            asset: darwin-x64
            ext: ""
          - target: bun-darwin-arm64
            asset: darwin-arm64
            ext: ""
          - target: bun-windows-x64
            asset: windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v7

      # 复合 action：pin bun 1.3.14 + 缓存 ~/.bun/install/cache + frozen install（与 check 各 job 一致）。
      - uses: ./.github/actions/bun-install

      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: compile binary
        working-directory: cli
        run: |
          bun build --compile --target=${{ matrix.target }} \
            ./src/index.ts --outfile "party${{ matrix.ext }}"

      # #9 release-asset smoke：跑「真二进制」验 json 契约 + stdout/stderr/exit，
      # 堵 v0.2.7 那种「源码测试过了但打包入口/旧 binary 行为脱节」。只在 runner 原生的 linux-x64 跑。
      - name: json contract smoke
        if: matrix.target == 'bun-linux-x64'
        working-directory: cli
        env:
          AGENTPARTY_HOME: ${{ runner.temp }}/ap-smoke # 干净隔离，无残留 config/account
        run: |
          set -euo pipefail
          echo "version=$(./party --version)"
          # whoami --json（未登录）：schema/type/logged_in 且 stdout-only（stderr 须空）
          out="$(./party whoami --json 2>/tmp/w.err)"
          echo "$out" | jq -e '.schema=="agentparty.v1" and .type=="whoami" and .logged_in==false' >/dev/null
          if [ -s /tmp/w.err ]; then echo "FAIL: whoami --json 不该往 stderr 写"; cat /tmp/w.err; exit 1; fi
          # per-command --help：exit 0 + usage 到 stdout
          ./party history --help | grep -q usage
          # 错误路径 history --json（无 config）：exit≠0 + stdout 空 + stderr 有错（transport 契约）
          if ./party history --json >/tmp/hj.out 2>/tmp/hj.err; then echo "FAIL: 应非零退出"; exit 1; fi
          if [ -s /tmp/hj.out ]; then echo "FAIL: 错误路径 stdout 应为空"; cat /tmp/hj.out; exit 1; fi
          grep -q "no config" /tmp/hj.err
          echo "json contract smoke ✅"

      # 打 tar.gz + sha256（资产名与 install.sh/ps1 请求一致：party-<asset>.tar.gz）
      # sha256 文件里存 tar.gz 的名字，install 侧直接取第一段 hash 比对。
      - name: package
        id: pkg
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          pkg="party-${ASSET}.tar.gz"
          tar -czf "$pkg" -C cli "party${{ matrix.ext }}"
          sha256sum "$pkg" > "${pkg}.sha256"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"

      # cosign 离线验签链路：用 secrets 里的私钥对每个 tarball 签名，产出 <pkg>.sig。
      # install.sh/ps1 内嵌 pinned 公钥离线 verify-blob。未配私钥时跳过（install 侧回退 sha256）。
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign blob
        id: sign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          PKG: ${{ steps.pkg.outputs.pkg }}
        run: |
          if [ -z "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "::warning::COSIGN_PRIVATE_KEY 未配置 — 跳过签名（install 侧仅 sha256）"
            exit 0
          fi
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY \
            "$PKG" --output-signature "${PKG}.sig"

      # 保留 attest-build-provenance 作为额外溯源层（gh attestation verify 可增强验证）
      - name: attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.pkg.outputs.pkg }}

      # party-*.tar.gz* 一把捞 tar.gz / .sha256 / .sig（.sig 未签名时缺省，glob 不报错）
      - name: upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: party-*.tar.gz*
          if-no-files-found: error
          retention-days: 7

  desktop:
    name: build desktop ${{ matrix.asset }}
    if: startsWith(github.ref, 'refs/tags/v')
    # 解耦门禁：桌面构建只等 macOS check-desktop + 版本契约，不再被 CLI/worker check 拖住。
    needs:
      - check-desktop
      - version-contract
    runs-on: ${{ matrix.runner }}
    environment:
      name: release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset: darwin-x64
            rust_target: x86_64-apple-darwin
          - runner: macos-14
            asset: darwin-arm64
            rust_target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7

      # 复合 action：pin bun 1.3.14 + 缓存 ~/.bun/install/cache + frozen install。
      - uses: ./.github/actions/bun-install

      # release 全量 Rust 编译是这个 job 的大头，缓存 ~/.cargo + target/（按 runner 架构/Cargo.lock 分键，
      # arm 与 intel 各自成缓存）。冷编数分钟 → 温编增量。
      - name: cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: prepare and verify desktop sidecar
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          bun scripts/prepare-desktop-sidecar.ts --target "$RUST_TARGET"
          sidecar="desktop/src-tauri/binaries/party-${RUST_TARGET}"
          if [ ! -s "$sidecar" ] || [ ! -x "$sidecar" ]; then
            echo "::error::desktop sidecar is missing, empty, or not executable: $sidecar"
            exit 1
          fi
          sidecar_version="$("$sidecar" --version)"
          if [ "$sidecar_version" != "${GITHUB_REF_NAME#v}" ]; then
            echo "::error::desktop sidecar version mismatch: tag=${GITHUB_REF_NAME#v} sidecar=$sidecar_version"
            exit 1
          fi

      - name: resolve updater key mode
        id: updater-key-mode
        env:
          DESKTOP_UPDATER_KEY_MODE: ${{ vars.DESKTOP_UPDATER_KEY_MODE }}
          DESKTOP_UPDATER_BRIDGE_TAG: ${{ vars.DESKTOP_UPDATER_BRIDGE_TAG }}
        run: |
          set -euo pipefail
          mode="${DESKTOP_UPDATER_KEY_MODE:-}"
          case "$mode" in
            legacy|bridge|v2) ;;
            *)
              echo "::error::invalid DESKTOP_UPDATER_KEY_MODE: $mode"
              exit 1
              ;;
          esac
          if [ "$mode" != "legacy" ] && [ -z "${DESKTOP_UPDATER_BRIDGE_TAG:-}" ]; then
            echo "::error::DESKTOP_UPDATER_BRIDGE_TAG is required for $mode updater key mode"
            exit 1
          fi
          if [ "$mode" = "bridge" ] && [ "$DESKTOP_UPDATER_BRIDGE_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::bridge mode requires DESKTOP_UPDATER_BRIDGE_TAG to equal the release tag"
            exit 1
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: require legacy updater signing key
        if: steps.updater-key-mode.outputs.mode != 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for desktop updater artifacts"
            exit 1
          fi

      - name: require v2 updater signing key
        if: steps.updater-key-mode.outputs.mode == 'bridge' || steps.updater-key-mode.outputs.mode == 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY_V2: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_V2:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_V2 is required for ${{ steps.updater-key-mode.outputs.mode }} updater key mode"
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 is required for ${{ steps.updater-key-mode.outputs.mode }} updater key mode"
            exit 1
          fi

      - name: detect Apple Developer ID and notarization credentials
        id: apple-signing
        env:
          DESKTOP_REQUIRE_NOTARIZATION: ${{ vars.DESKTOP_REQUIRE_NOTARIZATION }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bun scripts/apple-signing-mode.ts

      - name: import Apple Developer ID certificate
        if: steps.apple-signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/agentparty-developer-id.p12"
          keychain_path="$RUNNER_TEMP/agentparty-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          default_keychain="$(security default-keychain -d user | tr -d '"')"
          security list-keychains -d user -s "$keychain_path" "$default_keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
          signing_identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [ -z "$signing_identity" ]; then
            echo "::error::Developer ID Application identity was not found in the imported certificate"
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"

      - name: prepare App Store Connect API key
        if: steps.apple-signing.outputs.enabled == 'true' && steps.apple-signing.outputs.auth_mode == 'api-key'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$APPLE_API_KEY_PATH"
          if [ ! -s "$APPLE_API_KEY_PATH" ]; then
            echo "::error::decoded App Store Connect API key is empty"
            exit 1
          fi
          if ! grep -q '^-----BEGIN PRIVATE KEY-----$' "$APPLE_API_KEY_PATH" || \
             ! grep -q '^-----END PRIVATE KEY-----$' "$APPLE_API_KEY_PATH"; then
            echo "::error::decoded App Store Connect API key is not a valid p8 private key"
            exit 1
          fi
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: build notarized desktop app with legacy updater key
        if: steps.apple-signing.outputs.enabled == 'true' && steps.updater-key-mode.outputs.mode != 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          NOTARIZATION_AUTH_MODE: ${{ steps.apple-signing.outputs.auth_mode }}
          AGENTPARTY_DESKTOP_DISTRIBUTION: production
          AGENTPARTY_DESKTOP_NOTARIZED: "true"
          TAURI_CONFIG: '{"plugins":{"updater":{"endpoints":["https://github.com/leeguooooo/agentparty/releases/download/desktop-stable/latest-v2.json"]}}}'
        run: |
          set -euo pipefail
          if [ "$NOTARIZATION_AUTH_MODE" = "api-key" ]; then
            unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          else
            unset APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PATH
          fi
          bun run desktop:build:prod

      - name: build notarized desktop app with v2 updater key
        if: steps.apple-signing.outputs.enabled == 'true' && steps.updater-key-mode.outputs.mode == 'v2'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          NOTARIZATION_AUTH_MODE: ${{ steps.apple-signing.outputs.auth_mode }}
          AGENTPARTY_DESKTOP_DISTRIBUTION: production
          AGENTPARTY_DESKTOP_NOTARIZED: "true"
          TAURI_CONFIG: '{"plugins":{"updater":{"endpoints":["https://github.com/leeguooooo/agentparty/releases/download/desktop-stable/latest-v2.json"]}}}'
        run: |
          set -euo pipefail
          if [ "$NOTARIZATION_AUTH_MODE" = "api-key" ]; then
            unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          else
            unset APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PATH
          fi
          bun run desktop:build:prod

      - name: build unnotarized desktop preview with legacy updater key
        if: steps.apple-signing.outputs.enabled == 'false' && steps.updater-key-mode.outputs.mode != 'v2'
        env:
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AGENTPARTY_DESKTOP_DISTRIBUTION: preview
          AGENTPARTY_DESKTOP_NOTARIZED: "false"
          TAURI_CONFIG: '{"plugins":{"updater":{"endpoints":["https://github.com/leeguooooo/agentparty/releases/download/desktop-preview/latest-v2.json"]}}}'
        run: bun run desktop:build:prod

      - name: build unnotarized desktop preview with v2 updater key
        if: steps.apple-signing.outputs.enabled == 'false' && steps.updater-key-mode.outputs.mode == 'v2'
        env:
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
          AGENTPARTY_DESKTOP_DISTRIBUTION: preview
          AGENTPARTY_DESKTOP_NOTARIZED: "false"
          TAURI_CONFIG: '{"plugins":{"updater":{"endpoints":["https://github.com/leeguooooo/agentparty/releases/download/desktop-preview/latest-v2.json"]}}}'
        run: bun run desktop:build:prod

      - name: verify Developer ID signature and notarization ticket
        if: steps.apple-signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          app="$(find desktop/src-tauri/target/release/bundle/macos -name '*.app' -type d | head -n 1)"
          dmg="$(find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -type f | head -n 1)"
          if [ -z "$app" ] || [ -z "$dmg" ]; then
            echo "::error::macOS app bundle or DMG is missing"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=4 "$app"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"

      - name: verify complete ad-hoc app bundle signature
        if: steps.apple-signing.outputs.enabled == 'false'
        run: |
          set -euo pipefail
          app="$(find desktop/src-tauri/target/release/bundle/macos -name '*.app' -type d | head -n 1)"
          if [ -z "$app" ]; then
            echo "::error::macOS app bundle is missing"
            exit 1
          fi
          code_resources="$app/Contents/_CodeSignature/CodeResources"
          if [ ! -s "$code_resources" ]; then
            echo "::error::complete ad-hoc bundle signature is missing CodeResources"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app"
          signature="$(codesign -dv --verbose=4 "$app" 2>&1)"
          printf '%s\n' "$signature"
          grep -Fxq 'Signature=adhoc' <<< "$signature"
          grep -Fxq 'Identifier=com.agentparty.desktop' <<< "$signature"
          grep -Fxq 'TeamIdentifier=not set' <<< "$signature"
          if grep -q '^Authority=' <<< "$signature"; then
            echo "::error::ad-hoc desktop bundle unexpectedly contains a certificate authority"
            exit 1
          fi
          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app/Contents/Info.plist")"
          if [ "$bundle_id" != 'com.agentparty.desktop' ]; then
            echo "::error::desktop bundle identifier mismatch: $bundle_id"
            exit 1
          fi

      - name: verify bundled desktop sidecar
        run: |
          set -euo pipefail
          app="$(find desktop/src-tauri/target/release/bundle/macos -name '*.app' -type d | head -n 1)"
          bundled_sidecar="$app/Contents/MacOS/party"
          if [ -z "$app" ] || [ ! -s "$bundled_sidecar" ] || [ ! -x "$bundled_sidecar" ]; then
            echo "::error::executable desktop sidecar is missing from the app bundle"
            exit 1
          fi
          bundled_version="$("$bundled_sidecar" --version)"
          if [ "$bundled_version" != "${GITHUB_REF_NAME#v}" ]; then
            echo "::error::bundled sidecar version mismatch: tag=${GITHUB_REF_NAME#v} sidecar=$bundled_version"
            exit 1
          fi

      - name: sign bridge updater with v2 key
        if: steps.updater-key-mode.outputs.mode == 'bridge'
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
        run: |
          set -euo pipefail
          updater="$(find src-tauri/target/release/bundle/macos -name '*.app.tar.gz' -type f | head -n 1)"
          if [ -z "$updater" ] || [ ! -s "${updater}.sig" ]; then
            echo "::error::legacy updater signature is missing before bridge dual-signing"
            exit 1
          fi
          cp "${updater}.sig" "${updater}.sig.legacy"
          rm "${updater}.sig"
          bunx tauri signer sign "$updater"
          if [ ! -s "${updater}.sig" ]; then
            echo "::error::v2 updater signature was not generated"
            exit 1
          fi
          mv "${updater}.sig" "${updater}.sig.v2"
          mv "${updater}.sig.legacy" "${updater}.sig"

      - name: package desktop artifacts
        env:
          ASSET: ${{ matrix.asset }}
          NOTARIZED: ${{ steps.apple-signing.outputs.enabled }}
          UPDATER_KEY_MODE: ${{ steps.updater-key-mode.outputs.mode }}
          NOTARIZATION_AUTH: ${{ steps.apple-signing.outputs.auth_mode }}
        run: |
          set -euo pipefail
          dmg="$(find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -type f 2>/dev/null | head -n 1 || true)"
          updater="$(find desktop/src-tauri/target/release/bundle/macos -name '*.app.tar.gz' -type f 2>/dev/null | head -n 1 || true)"
          if [ ! -s "$dmg" ] || [ ! -s "$updater" ] || [ ! -s "${updater}.sig" ]; then
            echo "Missing DMG, updater bundle, or updater signature"
            find desktop/src-tauri/target/release/bundle -type f || true
            exit 1
          fi
          if [ "$UPDATER_KEY_MODE" = "bridge" ] && [ ! -s "${updater}.sig.v2" ]; then
            echo "::error::bridge updater v2 signature is missing"
            exit 1
          fi
          dmg_out="agentparty-desktop-${ASSET}.dmg"
          updater_out="agentparty-desktop-${ASSET}.app.tar.gz"
          cp "$dmg" "$dmg_out"
          cp "$updater" "$updater_out"
          cp "${updater}.sig" "${updater_out}.sig"
          if [ "$UPDATER_KEY_MODE" = "bridge" ]; then
            cp "${updater}.sig.v2" "${updater_out}.sig.v2"
          fi
          shasum -a 256 "$dmg_out" > "${dmg_out}.sha256"
          distribution="preview"
          if [ "$NOTARIZED" = "true" ]; then
            distribution="production"
          fi
          printf '{"notarized":%s,"distribution":"%s","updater_key_mode":"%s","notarization_auth":"%s"}\n' \
            "$NOTARIZED" "$distribution" "$UPDATER_KEY_MODE" "$NOTARIZATION_AUTH" > "agentparty-desktop-${ASSET}.signing-status.json"

      - name: upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.asset }}
          path: agentparty-desktop-*
          if-no-files-found: error
          retention-days: 7

  # ── 汇总所有产物挂到该 tag 的 Release ──────────────────────
  release:
    name: publish release
    needs:
      - build
      - desktop
    concurrency:
      group: desktop-updater-fixed-channel
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write # 建/改 Release、上传 assets
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: resolve updater key mode
        id: updater-key-mode
        env:
          DESKTOP_UPDATER_KEY_MODE: ${{ vars.DESKTOP_UPDATER_KEY_MODE }}
          DESKTOP_UPDATER_BRIDGE_TAG: ${{ vars.DESKTOP_UPDATER_BRIDGE_TAG }}
        run: |
          set -euo pipefail
          mode="${DESKTOP_UPDATER_KEY_MODE:-}"
          case "$mode" in
            legacy|bridge|v2) ;;
            *)
              echo "::error::invalid DESKTOP_UPDATER_KEY_MODE: $mode"
              exit 1
              ;;
          esac
          if [ "$mode" != "legacy" ] && [ -z "${DESKTOP_UPDATER_BRIDGE_TAG:-}" ]; then
            echo "::error::DESKTOP_UPDATER_BRIDGE_TAG is required for $mode updater key mode"
            exit 1
          fi
          if [ "$mode" = "bridge" ] && [ "$DESKTOP_UPDATER_BRIDGE_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::bridge mode requires DESKTOP_UPDATER_BRIDGE_TAG to equal the release tag"
            exit 1
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: collect artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: classify desktop distribution
        id: desktop-distribution
        env:
          EXPECTED_UPDATER_KEY_MODE: ${{ steps.updater-key-mode.outputs.mode }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          status_files=(dist/*.signing-status.json)
          if [ "${#status_files[@]}" -ne 2 ]; then
            echo "::error::expected two desktop signing status files, found ${#status_files[@]}"
            exit 1
          fi

          status_count="$(jq -s 'map({notarized, distribution, updater_key_mode, notarization_auth}) | unique | length' "${status_files[@]}")"
          if [ "$status_count" -ne 1 ]; then
            echo "::error::desktop architectures disagree on signing status, updater key mode, or notarization auth"
            jq -s '.' "${status_files[@]}"
            exit 1
          fi

          notarized="$(jq -r '.notarized' "${status_files[0]}")"
          distribution="$(jq -r '.distribution' "${status_files[0]}")"
          updater_key_mode="$(jq -r '.updater_key_mode' "${status_files[0]}")"
          notarization_auth="$(jq -r '.notarization_auth' "${status_files[0]}")"
          if [ "$updater_key_mode" != "$EXPECTED_UPDATER_KEY_MODE" ]; then
            echo "::error::desktop updater key mode does not match release configuration"
            exit 1
          fi
          if [ "$notarized" = "true" ] && [ "$distribution" = "production" ]; then
            if [ "$notarization_auth" != "apple-id" ] && [ "$notarization_auth" != "api-key" ]; then
              echo "::error::production desktop release has invalid notarization authentication metadata"
              exit 1
            fi
            DESKTOP_RELEASE_NOTES="AgentParty $GITHUB_REF_NAME desktop update; Developer ID signed and Apple notarized."
            cat > dist/release-body.md <<EOF
          ## AgentParty $GITHUB_REF_NAME

          CLI packages and the macOS desktop application are available below.

          The macOS desktop artifacts are Developer ID signed and Apple notarized. Gatekeeper verification is part of the release workflow.
          EOF
          elif [ "$notarized" = "false" ] && [ "$distribution" = "preview" ]; then
            if [ "$notarization_auth" != "none" ]; then
              echo "::error::preview desktop release must record notarization_auth=none"
              exit 1
            fi
            DESKTOP_RELEASE_NOTES="AgentParty $GITHUB_REF_NAME ad-hoc macOS release; not Developer ID signed or Apple notarized."
            cat > dist/release-body.md <<EOF
          ## AgentParty $GITHUB_REF_NAME

          CLI packages are production release artifacts.

          > **macOS ad-hoc distribution:** The DMG files are available from the AgentParty download page, but they are not Developer ID signed or Apple notarized. Use the documented one-line installer for checksum verification and first launch; direct DMG installation may be blocked by Gatekeeper.
          EOF
          else
            echo "::error::invalid desktop signing status: notarized=$notarized distribution=$distribution"
            exit 1
          fi
          echo "DESKTOP_RELEASE_NOTES=$DESKTOP_RELEASE_NOTES" >> "$GITHUB_ENV"
          echo "distribution=$distribution" >> "$GITHUB_OUTPUT"

      - name: generate release changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n --arg tag_name "$GITHUB_REF_NAME" '{tag_name: $tag_name}' > dist/generate-notes-request.json
          gh api --method POST "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            --input dist/generate-notes-request.json \
            --jq .body > dist/generated-release-notes.md
          if [ ! -s dist/generated-release-notes.md ]; then
            echo "::error::GitHub generated an empty release changelog"
            exit 1
          fi
          printf '\n' >> dist/release-body.md
          cat dist/generated-release-notes.md >> dist/release-body.md

      - name: generate desktop updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATER_KEY_MODE: ${{ steps.updater-key-mode.outputs.mode }}
          DESKTOP_UPDATER_BRIDGE_TAG: ${{ vars.DESKTOP_UPDATER_BRIDGE_TAG }}
        run: |
          set -euo pipefail
          generate_manifest() {
            local output="$1"
            local signature_suffix="$2"
            bun scripts/desktop-update-manifest.ts \
              --version "${GITHUB_REF_NAME#v}" \
              --tag "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --dir dist \
              --output "$output" \
              --notes "$DESKTOP_RELEASE_NOTES" \
              --signature-suffix "$signature_suffix"
          }

          case "$UPDATER_KEY_MODE" in
            legacy)
              generate_manifest dist/latest.json ".sig"
              ;;
            bridge)
              generate_manifest dist/latest.json ".sig"
              generate_manifest dist/latest-v2.json ".sig.v2"
              ;;
            v2)
              gh release download "$DESKTOP_UPDATER_BRIDGE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern latest.json \
                --output dist/latest.json
              bridge_version="${DESKTOP_UPDATER_BRIDGE_TAG#v}"
              encoded_bridge_tag="$(jq -rn --arg tag "$DESKTOP_UPDATER_BRIDGE_TAG" '$tag | @uri')"
              bridge_path="/releases/download/${encoded_bridge_tag}/"
              if ! jq -e --arg version "$bridge_version" --arg bridge_path "$bridge_path" '
                .version == $version and
                (.platforms | type == "object" and length > 0) and
                all(.platforms[];
                  (.url | type == "string" and contains($bridge_path)) and
                  (.signature | type == "string" and length > 0)
                )
              ' dist/latest.json >/dev/null; then
                echo "::error::legacy updater manifest does not point to the configured bridge tag"
                exit 1
              fi
              generate_manifest dist/latest-v2.json ".sig"
              ;;
          esac

      - name: classify release channel
        id: release-channel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_WITHOUT_BUILD="${VERSION%%+*}"
          if [[ "$VERSION_WITHOUT_BUILD" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

      # CLI cosign .sig 是可选层（未配 COSIGN_PRIVATE_KEY 时不存在），故保留
      # fail_on_unmatched_files:false；Tauri updater .sig 已由 desktop job 强制校验。
      - name: upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.release-channel.outputs.prerelease }}
          make_latest: ${{ steps.release-channel.outputs.make_latest }}
          body_path: dist/release-body.md
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
            dist/*.tar.gz.sig.v2
            dist/*.dmg
            dist/*.dmg.sha256
            dist/*.signing-status.json
            dist/latest.json
            dist/latest-v2.json

      - name: publish isolated desktop updater channel
        env:
          GH_TOKEN: ${{ github.token }}
          DESKTOP_DISTRIBUTION: ${{ steps.desktop-distribution.outputs.distribution }}
        run: |
          set -euo pipefail
          case "$DESKTOP_DISTRIBUTION" in
            production) channel_tag="desktop-stable" ;;
            preview) channel_tag="desktop-preview" ;;
            *)
              echo "::error::invalid desktop updater channel: $DESKTOP_DISTRIBUTION"
              exit 1
              ;;
          esac
          if ! gh release view "$channel_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$channel_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "AgentParty Desktop ${DESKTOP_DISTRIBUTION} channel" \
              --notes "Machine-managed desktop updater manifest channel." \
              --prerelease \
              || gh release view "$channel_tag" --repo "$GITHUB_REPOSITORY" >/dev/null
          fi
          manifests=()
          for manifest in dist/latest.json dist/latest-v2.json; do
            if [ -s "$manifest" ]; then
              manifests+=("$manifest")
            fi
          done
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "::error::no desktop updater manifests are available"
            exit 1
          fi

          primary_manifest="dist/latest.json"
          if [ -s dist/latest-v2.json ]; then
            primary_manifest="dist/latest-v2.json"
          fi
          candidate_version="$(jq -er '.version | strings' "$primary_manifest")"
          if [ "$candidate_version" != "${GITHUB_REF_NAME#v}" ]; then
            echo "::error::desktop updater manifest version does not match the release tag"
            exit 1
          fi
          for manifest in "${manifests[@]}"; do
            manifest_version="$(jq -er '.version | strings' "$manifest")"
            bun scripts/release-version.ts --check-not-older-than "$manifest_version" "$manifest_version"
          done

          backup_dir="$RUNNER_TEMP/desktop-updater-channel-backup"
          rm -rf "$backup_dir"
          mkdir -p "$backup_dir"
          existing_assets="$(gh release view "$channel_tag" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name')"
          for manifest in "${manifests[@]}"; do
            manifest_name="$(basename "$manifest")"
            if grep -Fxq "$manifest_name" <<<"$existing_assets"; then
              gh release download "$channel_tag" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern "$manifest_name" \
                --output "$backup_dir/$manifest_name"
              current_version="$(jq -er '.version | strings' "$backup_dir/$manifest_name")"
              bun scripts/release-version.ts \
                --check-not-older-than "$current_version" "$candidate_version"
            fi
          done

          restore_channel_manifests() {
            original_status=$?
            trap - ERR
            set +e
            restore_failed=0
            echo "::warning::desktop updater channel publication failed; restoring previous manifests"
            for manifest in "${manifests[@]}"; do
              manifest_name="$(basename "$manifest")"
              gh release delete-asset "$channel_tag" "$manifest_name" \
                --repo "$GITHUB_REPOSITORY" \
                --yes >/dev/null 2>&1 || true
            done
            for backup in "$backup_dir"/*; do
              [ -f "$backup" ] || continue
              gh release upload "$channel_tag" "$backup" \
                --repo "$GITHUB_REPOSITORY" \
                --clobber || restore_failed=1
            done
            rollback_verification_dir="$RUNNER_TEMP/desktop-updater-channel-rollback-verification"
            rm -rf "$rollback_verification_dir"
            mkdir -p "$rollback_verification_dir"
            if ! restored_assets="$(gh release view "$channel_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name')"; then
              echo "::error::failed to list updater manifests after rollback"
              restored_assets=""
              restore_failed=1
            fi
            for manifest in "${manifests[@]}"; do
              manifest_name="$(basename "$manifest")"
              backup="$backup_dir/$manifest_name"
              if [ -f "$backup" ]; then
                restored="$rollback_verification_dir/$manifest_name"
                if ! gh release download "$channel_tag" \
                  --repo "$GITHUB_REPOSITORY" \
                  --pattern "$manifest_name" \
                  --output "$restored" \
                  || ! cmp --silent "$backup" "$restored"; then
                  echo "::error::restored updater manifest does not match its backup: $manifest_name"
                  restore_failed=1
                fi
              elif grep -Fxq "$manifest_name" <<<"$restored_assets"; then
                echo "::error::candidate updater manifest remained after rollback: $manifest_name"
                restore_failed=1
              fi
            done
            if [ "$restore_failed" -ne 0 ]; then
              echo "::error::desktop updater channel rollback was incomplete"
              exit 1
            fi
            exit "$original_status"
          }

          trap restore_channel_manifests ERR
          gh release upload "$channel_tag" "${manifests[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

          verification_dir="$RUNNER_TEMP/desktop-updater-channel-verification"
          rm -rf "$verification_dir"
          mkdir -p "$verification_dir"
          for manifest in "${manifests[@]}"; do
            manifest_name="$(basename "$manifest")"
            gh release download "$channel_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$manifest_name" \
              --output "$verification_dir/$manifest_name"
            cmp --silent "$manifest" "$verification_dir/$manifest_name"
          done
          trap - ERR
