# 合并前必须「读了 review」的强制闸——对所有人生效，不靠任何人记忆。
# 机制：job 显式给 PR head SHA 发一个 commit status（context=review-ack）。
#   - 当前 head 的 pr_agent workflow 已完成、CodeRabbit review 已落地；
#   - 非机器人的正式 PR review / review-ack 评论必须晚于最新 bot review，才能 success。
# 用 commit status 而非 job 自身的 check-run，是因为 issue_comment 事件的 run 跑在 main ref 上、
#   其自动 check-run 挂不到 PR head SHA；显式发 status 到 head SHA 才能让「留 ack 后」正确转绿。
# job 名 review_ack_runner ≠ required 的 context(review-ack)，避免两个同名 check 冲突。
# pr_agent 端点挂时以 workflow completed 为已尽责，不要求它必须产出评论；CodeRabbit 仍须对当前 head 落 review。
name: Review Ack Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]
  issue_comment:
    types: [created, edited, deleted]
  workflow_run:
    workflows: ["PR Agent (qwen · soft-gate)"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read
  issues: read
  checks: read
  statuses: write   # 给 head SHA 发 commit status

concurrency:
  group: review-ack-${{ github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: false

jobs:
  review_ack_runner:
    if: >-
      (github.event_name != 'issue_comment' || github.event.issue.pull_request) &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.pull_requests[0])
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: 评估 ack 并给 PR head SHA 发 review-ack commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.pull_requests[0].number }}
          REQUIRE_CODERABBIT: "true"
        run: node scripts/review-ack-gate.mjs
