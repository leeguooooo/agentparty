name: release desktop UI

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'shared/**'
      - 'scripts/desktop-ui-*.ts'
      - '.github/workflows/release-desktop-ui.yml'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:
    inputs:
      version:
        description: Desktop UI release version (semver, without v)
        required: true
        type: string
      ui_abi:
        description: Desktop shell/UI ABI
        required: true
        default: "1"
        type: string
      min_shell_version:
        description: Minimum compatible desktop shell version
        required: true
        default: "0.2.94"
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-ui-release
  cancel-in-progress: false

jobs:
  build-sign-publish:
    name: build, sign, and publish desktop UI
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: validate and derive release metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_UI_ABI: ${{ inputs.ui_abi }}
          INPUT_MIN_SHELL_VERSION: ${{ inputs.min_shell_version }}
        run: |
          set -euo pipefail
          semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            UI_VERSION="$INPUT_VERSION"
          else
            UI_VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          UI_ABI="${INPUT_UI_ABI:-1}"
          MIN_SHELL_VERSION="${INPUT_MIN_SHELL_VERSION:-0.2.94}"
          [[ "$UI_VERSION" =~ $semver ]] || { echo "::error::invalid Desktop UI version"; exit 1; }
          [[ "$MIN_SHELL_VERSION" =~ $semver ]] || { echo "::error::invalid minimum shell version"; exit 1; }
          [[ "$UI_ABI" =~ ^(0|[1-9][0-9]*)$ ]] || { echo "::error::invalid UI ABI"; exit 1; }
          if [ "$UI_ABI" -lt 1 ] || [ "$UI_ABI" -gt 65535 ]; then
            echo "::error::UI ABI must be between 1 and 65535"
            exit 1
          fi
          ASSET="agentparty-desktop-ui-v${UI_VERSION}.tar.gz"
          VERSIONED_MANIFEST="agentparty-desktop-ui-v${UI_VERSION}.json"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "UI_VERSION=$UI_VERSION"
            echo "UI_ABI=$UI_ABI"
            echo "MIN_SHELL_VERSION=$MIN_SHELL_VERSION"
            echo "ASSET=$ASSET"
            echo "VERSIONED_MANIFEST=$VERSIONED_MANIFEST"
            echo "PUBLISHED_AT=$PUBLISHED_AT"
          } >> "$GITHUB_ENV"

      - name: build production web UI
        working-directory: web
        run: VITE_API_BASE=https://agentparty.leeguoo.com bunx vite build

      - name: bundle Desktop UI deterministically
        run: |
          bun scripts/desktop-ui-bundle.ts \
            --source web/dist \
            --output "dist/$ASSET"

      - name: sign Desktop UI archive
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
        run: |
          set -euo pipefail
          [ -n "$TAURI_SIGNING_PRIVATE_KEY" ] || { echo "::error::TAURI_SIGNING_PRIVATE_KEY_V2 is required"; exit 1; }
          [ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ] || { echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 is required"; exit 1; }
          bunx tauri signer sign "../dist/$ASSET"
          [ -s "../dist/$ASSET.sig" ] || { echo "::error::Desktop UI signature was not generated"; exit 1; }

      - name: generate Desktop UI manifest
        run: |
          bun scripts/desktop-ui-manifest.ts \
            --version "$UI_VERSION" \
            --ui-abi "$UI_ABI" \
            --min-shell-version "$MIN_SHELL_VERSION" \
            --build-id "$GITHUB_SHA" \
            --published-at "$PUBLISHED_AT" \
            --repo "$GITHUB_REPOSITORY" \
            --archive "dist/$ASSET" \
            --output dist/desktop-ui-manifest-payload.json

      - name: sign Desktop UI manifest
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_V2 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
        run: |
          set -euo pipefail
          bunx tauri signer sign "../dist/desktop-ui-manifest-payload.json"
          [ -s ../dist/desktop-ui-manifest-payload.json.sig ] || { echo "::error::Desktop UI manifest signature was not generated"; exit 1; }

      - name: finalize signed Desktop UI manifest envelope
        run: |
          bun scripts/desktop-ui-manifest.ts \
            --payload dist/desktop-ui-manifest-payload.json \
            --signature dist/desktop-ui-manifest-payload.json.sig \
            --output "dist/$VERSIONED_MANIFEST"
          cp "dist/$VERSIONED_MANIFEST" dist/desktop-ui.json

      - name: publish fixed desktop-ui release channel
        uses: softprops/action-gh-release@v3
        with:
          tag_name: desktop-ui
          name: AgentParty Desktop UI
          body: Independent signed Desktop UI bundle channel. Use desktop-ui.json for the current manifest.
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/agentparty-desktop-ui-v*.tar.gz
            dist/agentparty-desktop-ui-v*.tar.gz.sha256
            dist/agentparty-desktop-ui-v*.tar.gz.sig
            dist/agentparty-desktop-ui-v*.json
            dist/desktop-ui.json
