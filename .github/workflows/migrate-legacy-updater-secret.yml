name: Migrate legacy updater secret

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-encrypted-secret:
    name: Export encrypted legacy updater key
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Encrypt legacy updater key
        shell: bash
        env:
          LEGACY_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          MIGRATION_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD_V2 }}
        run: |
          set -euo pipefail
          test -n "$LEGACY_UPDATER_KEY"
          test -n "$MIGRATION_PASSWORD"
          umask 077
          printf '%s' "$LEGACY_UPDATER_KEY" \
            | openssl enc -aes-256-cbc -pbkdf2 -salt \
                -pass env:MIGRATION_PASSWORD \
                -out legacy-updater-key.enc

      - name: Upload encrypted migration artifact
        uses: actions/upload-artifact@v4
        with:
          name: legacy-updater-key-migration
          path: legacy-updater-key.enc
          if-no-files-found: error
          retention-days: 1
